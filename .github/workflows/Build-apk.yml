name: Build Base APK

on:
  workflow_dispatch:
    inputs:
      commit_to_repo:
        description: "Commit generated APK to repository"
        required: false
        default: true
        type: boolean

# Setup permission 
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Setup Java (Required for Android)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Setup Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Make Gradle executable
      - name: Grant execute permission for gradlew
        run: chmod +x fason/gradlew

      # Build Debug APK
      - name: Build Debug APK
        run: |
          cd fason
          ./gradlew assembleDebug --no-daemon

      # Verify APK exists
      - name: Verify APK
        run: |
          APK_PATH="fason/app/build/outputs/apk/debug/app-debug.apk"

          if [ ! -f "$APK_PATH" ]; then
            echo "❌ APK build failed."
            exit 1
          fi

          echo "✅ APK built successfully."
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "APK_SIZE=$APK_SIZE" >> $GITHUB_ENV

      # Upload APK as artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fason-base-apk
          path: fason/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Optional: Commit APK to repository
      - name: Commit APK to repository
        if: ${{ github.event.inputs.commit_to_repo }}
        run: |
          APK_PATH="fason/app/build/outputs/apk/debug/app-debug.apk"
          TARGET_DIR="server/app/factory/rawapk"
          TARGET_PATH="$TARGET_DIR/app-debug.apk"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p "$TARGET_DIR"
          cp "$APK_PATH" "$TARGET_PATH"

          if git diff --quiet "$TARGET_PATH"; then
            echo "No changes detected. Skipping commit."
          else
            git add "$TARGET_PATH"
            git commit -m "chore: update base APK [skip ci]"
            git push origin HEAD:${{ github.ref }}
            echo "✅ APK committed successfully."
          fi

      # Build Summary
      - name: Build Summary
        run: |
          echo "## 📦 APK Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Status:** Success" >> $GITHUB_STEP_SUMMARY
          echo "- **APK Size:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact Name:** fason-base-apk" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK from the **Artifacts** section of this workflow run." >> $GITHUB_STEP_SUMMARY