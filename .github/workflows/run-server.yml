name: Run Server for Manual Testing (Cloudflare)

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Server runtime (minutes)"
        required: true
        default: "15"
        type: choice
        options: ["5", "10", "15", "30", "60"]

env:
  NODE_VERSION: "18"
  SERVER_PORT: 22533

jobs:
  run-server:
    name: Manual Test Server
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      # Checkout project
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Install dependencies
      - name: Install dependencies
        run: npm install

      # Ensure required directories exist
      - name: Prepare directories
        run: |
          mkdir -p server/data/{clients,backups,built_apks}
          mkdir -p server/data/clients/{downloads,photos,recordings}

      # Install Cloudflare Tunnel (cloudflared)
      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      # Start server and expose via Cloudflare Quick Tunnel
      - name: Start server and Cloudflare tunnel
        run: |
          node server/fason.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 5

          if curl -s http://localhost:${{ env.SERVER_PORT }}/login > /dev/null; then
            echo "✅ Server started successfully."
          else
            echo "⚠️ Server may not be fully ready."
          fi

          echo "### 🔐 Default Credentials" >> $GITHUB_STEP_SUMMARY
          echo "- Username: admin" >> $GITHUB_STEP_SUMMARY
          echo "- Password: fason" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⏱ Duration: ${{ github.event.inputs.duration }} minutes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Start Cloudflare Quick Tunnel
          cloudflared tunnel --url http://localhost:${{ env.SERVER_PORT }} > tunnel.log 2>&1 &
          sleep 8

          PUBLIC_URL=$(grep -o 'https://[-a-z0-9]*\.trycloudflare.com' tunnel.log | head -n 1)

          if [ -n "$PUBLIC_URL" ]; then
            echo "PUBLIC_URL=$PUBLIC_URL" >> $GITHUB_ENV
            echo "🚀 Public URL: $PUBLIC_URL"
            echo "### 🌐 Public Access" >> $GITHUB_STEP_SUMMARY
            echo "$PUBLIC_URL" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Cloudflare tunnel failed."
            echo "### ❌ Tunnel failed to start" >> $GITHUB_STEP_SUMMARY
            cat tunnel.log
          fi

      # Keep server alive for selected duration
      - name: Keep server running
        run: |
          DURATION=${{ github.event.inputs.duration }}
          echo "⏱ Server active for $DURATION minutes."

          for ((i=1; i<=DURATION; i++)); do
            sleep 60
            echo "[$i/$DURATION] minute(s) elapsed"

            if ! curl -s http://localhost:${{ env.SERVER_PORT }}/login > /dev/null; then
              echo "⚠️ Server not responding. Restarting..."
              node server/fason.js &
              sleep 5
            fi
          done

          echo "⏰ Duration complete. Shutting down."

      # Cleanup processes
      - name: Cleanup
        if: always()
        run: |
          pkill -f "node server/fason.js" || true
          pkill -f cloudflared || true
          echo "✅ Cleanup complete."
